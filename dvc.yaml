stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
      - config.yaml
    outs:
      - data/raw/final_satellite_indices.csv
      - data/raw/annotations.csv

  data_cleaning:
    cmd: python src/data_cleaning.py
    deps:
      - src/data_cleaning.py
      - data/raw/final_satellite_indices.csv
      - data/raw/annotations.csv
    outs:
      - data/processed/train_final_dataset.csv
      - data/processed/val_final_dataset.csv
      - data/processed/test_final_dataset.csv